<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Figurini</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <p class="tag">Tool download immagini</p>
      <h1>Download Figurini</h1>
      <p>Inserisci i codici articolo a 6 caratteri. Il file scaricato viene rinominato con il codice articolo, ad esempio <strong>393VOD.jpg</strong>.</p>
    </section>

    <section class="card">
      <label for="lista">Codici articolo</label>
      <textarea id="lista" placeholder="Esempio:393VOD"></textarea>

      <div class="buttons">
        <button id="btnScarica" onclick="scaricaImmagini()">Scarica immagini</button>
        <button class="secondary" onclick="pulisci()">Pulisci</button>
      </div>
    </section>

    <section class="card result">
      <h2>Risultato</h2>
      <div id="status">Nessun download avviato.</div>
      <ul id="log"></ul>
    </section>

    <p class="note">Se il browser chiede di consentire download multipli, cliccare su "Consenti".</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
